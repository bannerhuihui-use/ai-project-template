# ===== 线上环境 =====
# 配置项与 local 一致，区别在于 .env 中填写生产环境的连接信息。
# 启动：--spring.profiles.active=prod （或在 .env 设 SPRING_PROFILES_ACTIVE=prod）
# 注意：生产环境 .env 切勿提交到仓库，建议用环境变量 / 密钥管理注入。
# 关系型数据库（单数据源）配置已统一在 application.yml，值来自 .env。

spring:
  # ---- 邮箱 ----
