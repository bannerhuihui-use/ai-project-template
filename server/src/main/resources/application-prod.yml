  #   username: ${MAIL_USERNAME}
  #   password: ${MAIL_PASSWORD}
  #   properties:
  #     mail.smtp.auth: true
  #     mail.smtp.ssl.enable: true

# 阿里云 OSS
# oss:
#   endpoint: ${OSS_ENDPOINT}
#   access-key-id: ${OSS_ACCESS_KEY_ID}
#   access-key-secret: ${OSS_ACCESS_KEY_SECRET}
#   bucket: ${OSS_BUCKET}

# 火山引擎 方舟大模型
# volcengine:
#   ark:
#     api-key: ${VOLC_ARK_API_KEY}
#     model: ${VOLC_ARK_MODEL}
#     base-url: ${VOLC_ARK_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}

# 短信
# sms:
#   access-key-id: ${SMS_ACCESS_KEY_ID}
#   access-key-secret: ${SMS_ACCESS_KEY_SECRET}
#   sign-name: ${SMS_SIGN_NAME}
#   template-code: ${SMS_TEMPLATE_CODE}

# 生产环境收紧健康检查详情，避免对外泄露组件信息
management:
  endpoint:
    health:
      show-details: never
      show-components: never

# 生产环境关闭 Swagger / OpenAPI，避免暴露接口结构与在线调试
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    com.example.template: INFO
